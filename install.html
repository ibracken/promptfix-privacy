<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install PromptFix</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 65%);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 44px);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 2.5vw, 2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .alert {
      margin: 0 0 20px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      text-align: left;
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .steps {
      margin: 0 0 24px;
      padding: 0;
      list-style: none;
      text-align: left;
      display: grid;
      gap: 10px;
    }

    .steps li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      align-items: start;
      color: var(--muted);
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 340px;
      min-height: 56px;
      padding: 14px 22px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      transition: background-color 120ms ease, transform 120ms ease;
    }

    .button:hover,
    .button:focus-visible {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: 2px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 24px;
      }

      .button {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card" id="app" aria-live="polite"></main>

  <script>
    (function renderInstallPage() {
      var app = document.getElementById('app');
      var ua = navigator.userAgent || '';
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);

      var desktopHtml = [
        '<h1>Install PromptFix</h1>',
        '<p>Use PromptFix directly in desktop Chrome by installing the extension.</p>',
        '<a class="button" href="https://chromewebstore.google.com/detail/promptfix/onbffgdmffjfdlffhmnpdnbhfmjmphpc" target="_blank" rel="noopener noreferrer">Add to Chrome</a>'
      ].join('');

      var mobileHtml = [
        '<h1>Finish install on your computer</h1>',
        '<p>This page is only for sending the install link. You must open the email on your desktop computer to install PromptFix.</p>',
        '<div class="alert"><strong>Important:</strong> Tap the button below, send yourself the email, then <strong>open that email on your desktop computer</strong> and click the install link there. Do not open the emailed link on your phone or you will return to this same page.</div>',
        '<ul class="steps"><li><span class="step-number">1</span><span>Tap <strong>Email this link to myself</strong>.</span></li><li><span class="step-number">2</span><span><strong>Open the email on your desktop computer.</strong></span></li><li><span class="step-number">3</span><span>Click the install link from desktop Chrome.</span></li></ul>',
        '<a class="button" href="mailto:?subject=Install%20PromptFix%20on%20Desktop&body=Open%20this%20email%20on%20your%20desktop%20computer%20to%20install%20PromptFix.%0A%0ADo%20not%20open%20this%20link%20on%20your%20phone:%0Ahttps://ibracken.github.io/promptfix-privacy/install">Email this link to myself</a>'
      ].join('');

      app.innerHTML = isMobile ? mobileHtml : desktopHtml;
    })();
  </script>
</body>
</html>
